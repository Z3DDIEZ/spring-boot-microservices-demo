apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: meridian
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: ghcr.io/yourusername/meridian-inventory-service:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: meridian-config
          env:
            - name: MONGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: meridian-secrets
                  key: MONGO_USERNAME
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: meridian-secrets
                  key: MONGO_PASSWORD
            - name: SPRING_DATA_MONGODB_URI
              value: "mongodb://$(MONGO_USERNAME):$(MONGO_PASSWORD)@mongodb-service:27017/inventory_db?authSource=admin"
            - name: SPRING_RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: meridian-secrets
                  key: RABBITMQ_USERNAME
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: meridian-secrets
                  key: RABBITMQ_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: meridian-secrets
                  key: JWT_SECRET
            - name: JAVA_TOOL_OPTIONS
              value: "-Xmx256m"
          ports:
            - containerPort: 8083
          resources:
            requests:
              memory: "300Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: meridian
spec:
  ports:
    - port: 8083
      targetPort: 8083
  selector:
    app: inventory-service
