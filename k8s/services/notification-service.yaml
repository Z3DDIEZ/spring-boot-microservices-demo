apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: meridian
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: ghcr.io/yourusername/meridian-notification-service:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: meridian-config
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres-notification-service:5432/meridian_notification"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: meridian-secrets
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: meridian-secrets
                  key: POSTGRES_PASSWORD
            - name: SPRING_RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: meridian-secrets
                  key: RABBITMQ_USERNAME
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: meridian-secrets
                  key: RABBITMQ_PASSWORD
            - name: SPRING_MAIL_HOST
              value: "mailhog-service"
            - name: SPRING_MAIL_PORT
              value: "1025"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: meridian-secrets
                  key: JWT_SECRET
            - name: JAVA_TOOL_OPTIONS
              value: "-Xmx256m"
          ports:
            - containerPort: 8084
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8084
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: meridian
spec:
  ports:
    - port: 8084
      targetPort: 8084
  selector:
    app: notification-service
---
# Mailhog deployment for testing locally
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailhog
  namespace: meridian
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailhog
  template:
    metadata:
      labels:
        app: mailhog
    spec:
      containers:
        - name: mailhog
          image: mailhog/mailhog
          ports:
            - containerPort: 1025
            - containerPort: 8025
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: mailhog-service
  namespace: meridian
spec:
  ports:
    - port: 1025
      name: smtp
    - port: 8025
      name: web
  selector:
    app: mailhog
