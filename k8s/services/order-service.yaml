apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: meridian
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: ghcr.io/yourusername/meridian-order-service:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: meridian-config
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres-order-service:5432/order_db"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: meridian-secrets
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: meridian-secrets
                  key: POSTGRES_PASSWORD
            - name: SPRING_RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: meridian-secrets
                  key: RABBITMQ_USERNAME
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: meridian-secrets
                  key: RABBITMQ_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: meridian-secrets
                  key: JWT_SECRET
            - name: JAVA_TOOL_OPTIONS
              value: "-Xmx256m"
          ports:
            - containerPort: 8082
          resources:
            requests:
              memory: "300Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: meridian
spec:
  ports:
    - port: 8082
      targetPort: 8082
  selector:
    app: order-service
