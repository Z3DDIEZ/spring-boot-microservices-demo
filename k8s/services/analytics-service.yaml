apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: meridian
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: ghcr.io/yourusername/meridian-analytics-service:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: meridian-config
          env:
            - name: SPRING_RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: meridian-secrets
                  key: RABBITMQ_USERNAME
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: meridian-secrets
                  key: RABBITMQ_PASSWORD
            - name: INFLUXDB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: meridian-secrets
                  key: INFLUXDB_TOKEN
            - name: INFLUXDB_ORG
              value: "meridian"
            - name: INFLUXDB_BUCKET
              value: "analytics"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: meridian-secrets
                  key: JWT_SECRET
            - name: JAVA_TOOL_OPTIONS
              value: "-Xmx256m"
          ports:
            - containerPort: 8085
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8085
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: meridian
spec:
  ports:
    - port: 8085
      targetPort: 8085
  selector:
    app: analytics-service
