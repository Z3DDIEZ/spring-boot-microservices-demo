global:
  springProfilesActive: "dev"

services:
  apiGateway:
    replicas: 1
    javaOptions: "-Xmx256m"
  authService:
    replicas: 1
    javaOptions: "-Xmx256m"
  orderService:
    replicas: 1
    javaOptions: "-Xmx256m"
  inventoryService:
    replicas: 1
    javaOptions: "-Xmx256m"
  notificationService:
    replicas: 1
    javaOptions: "-Xmx256m"
  analyticsService:
    replicas: 1
    javaOptions: "-Xmx256m"

# In dev, we can use slightly smaller PVCs if needed,
# but the defaults in values.yaml are already small enough.
