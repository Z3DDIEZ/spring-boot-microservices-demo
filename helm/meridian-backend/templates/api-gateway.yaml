apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api-gateway
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.services.apiGateway.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-api-gateway
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-api-gateway
    spec:
      containers:
        - name: api-gateway
          image: "{{ .Values.services.apiGateway.image }}:{{ .Values.services.apiGateway.tag }}"
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: JWT_SECRET
            - name: SPRING_APPLICATION_JSON
              value: '{"spring":{"cloud":{"discovery":{"client":{"simple":{"instances":{"auth-service":[{"uri":"http://{{.Release.Name}}-auth-service:8081"}],"order-service":[{"uri":"http://{{.Release.Name}}-order-service:8082"}]}}}}}}}'
            - name: JAVA_TOOL_OPTIONS
              value: {{ .Values.services.apiGateway.javaOptions | quote }}
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 150
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 150
            periodSeconds: 10
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api-gateway-service
  namespace: {{ .Values.global.namespace }}
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: {{ .Release.Name }}-api-gateway
---
{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  namespace: {{ .Values.global.namespace }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-api-gateway-service
                port:
                  number: 8080
{{- end }}
